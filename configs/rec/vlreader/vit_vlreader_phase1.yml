# VL-Reader phase 1 (MVLR pre-training).
#
# model_key: short identifier used by run_*.sh to compose Global.output_dir as
#   ./output/rec/<DATA_KEY>/<model_key>/  (DATA_KEY derived from --data alias)
# Inherited by variant configs (e.g. vit_vlreader_base_finetune.yml) via _BASE_.
model_key: vlreader

Global:
  device: gpu
  epoch_num: 20
  log_smooth_window: 20
  print_batch_step: 10
  # output_dir: auto-composed from --data + model_key by run_*.sh
  eval_epoch_step: [0, 1]    # epochл§ҲлӢӨ 1нҡҢ (visualization м—…лЎңл“ң нҠёлҰ¬кұ°)
  eval_batch_step: [0, 500]  # мһҗмЈј вҖ” epoch м •мҲҳк°Җ wandbм—җ л№Ҫл№Ҫмқҙ м°ҚнҳҖ stair-step curveк°Җ лҗҳлҸ„лЎқ. viz tableмқҖ eval_stepмқҳ log_samples=epoch boundaryм—җм„ңл§Ң л§Ңл“Өм–ҙм§ҖлҜҖлЎң л¶ҖлӢҙ м—ҶмқҢ
  save_epoch_step: [99999, 1]  # epoch_N.pth м ҖмһҘ л№„нҷңм„ұ (latest.pth/best.pthл§Ң мң м§Җ)
  cal_metric_during_train: False  # phase 1 train predsлҠ” dictмқҙлқј RecMetric л¶Ҳнҳёнҷҳ; phase1 metricмқҖ valм—җм„ңл§Ң
  pretrained_model:
  checkpoints:
  use_tensorboard: false
  use_wandb: true
  wandb_project: STR-reproduce
  infer_img:
  character_dict_path: &character_dict_path ./tools/utils/EN_symbol_dict.txt
  max_text_length: &max_text_length 25
  use_space_char: &use_space_char False
  use_amp: True
  # total_bs м„Өм • мӢң world_sizeлЎң лӮҳлҲ  per-card bs мһҗлҸҷ мӮ°м¶ң.
  # л№„мӣҢл‘җл©ҙ м•„лһҳ first_bs к°’ к·ёлҢҖлЎң per-card bsлЎң мӮ¬мҡ©.
  total_bs: 768
  # 1 GPU(A6000 48GB)м—җ per-card BS=768мқҙ fitн•ҳлҜҖлЎң accumulation л¶Ҳн•„мҡ”.
  # вҶ’ effective batch = 768 (paper л§Өм№ҳ).
  accumulation_steps: 1

Optimizer:
  # Paper В§4.1 specifies plain Adam (not AdamW). Stick with Adam to stay
  # faithful even though ViT models conventionally use AdamW. No weight
  # decay because the paper doesn't mention one and torch.optim.Adam's
  # `weight_decay` is L2-in-gradient (not decoupled) which is a different
  # regularizer entirely.
  name: Adam
  lr: 0.0007  # paper: 7e-4 with 4 GPUs * 192 = 768 effective bs

LRScheduler:
  name: OneCycleLR
  warmup_epoch: 1.5
  cycle_momentum: False

Architecture:
  model_type: rec
  algorithm: VLReader
  Transform:
  Encoder:
    name: ViTVLReader
    img_size: [32, 128]
    patch_size: [4, 8]
    embed_dim: 768
    depth: 12
    num_heads: 12
    mlp_ratio: 4
    mask_ratio: 0.75       # r_v
    # Paper Eq. 10 is just MSE on masked pixels вҖ” per-patch normalization
    # is a MAE-original convention not mentioned. Disable to stay closer to
    # paper text; treat as an ablation knob.
    norm_pix_loss: False
  Decoder:
    name: MVLDecoder
    max_label_length: *max_text_length
    embed_dim: 768
    dec_num_heads: 12
    dec_mlp_ratio: 4
    dec_depth: 4
    patch_size: [4, 8]
    in_image_channels: 3
    text_mask_ratio: 0.2   # r_l
    lambda_v: 1.0
    lambda_l: 1.0
    phase: pretrain
    decode_ar: True
    refine_iters: 1

Loss:
  name: VLReaderLoss

PostProcess:
  # Phase 1: pass-through dict + decode text strings for visualization.
  name: VLReaderPhase1PostProcess
  character_dict_path: *character_dict_path
  use_space_char: *use_space_char

Metric:
  # Phase 1: linguistic_acc (top-1 on masked tokens) + visual_mse on masked patches.
  name: VLReaderPhase1Metric
  main_indicator: linguistic_acc

Train:
  dataset:
    # ViT-BaseлҠ” fixed (32, 128) мһ…л Ҙл§Ң л°ӣмңјлҜҖлЎң RatioSamplerк°Җ м•„лӢҲлқј
    # LMDBDataSet + RecTVResizeлЎң лӘЁл“  мқҙлҜём§ҖлҘј лҸҷмқј shapeмңјлЎң нҶөмқј.
    # OpenOCR vit_parseq.ymlкіј мӣҗліё parseq л ҲнҸ¬к°Җ мұ„нғқн•ң л°©мӢқ.
    name: LMDBDataSet
    # к°Ғ entryлҠ” мһ¬к·Җ walkлҗҳм–ҙ leaf LMDBк°Җ лӘЁл‘җ мһҗлҸҷ picked up.
    # 9к°ң top-level лҚ°мқҙн„°м…Ӣ (train/val/test м „л¶Җ н•ҷмҠөм—җ мӮ¬мҡ©).
    data_dir_list: [
      '~/data/STR/parseq/english/lmdb/train/real/ArT',
      '~/data/STR/parseq/english/lmdb/train/real/COCOv2.0',
      '~/data/STR/parseq/english/lmdb/train/real/LSVT',
      '~/data/STR/parseq/english/lmdb/train/real/MLT19',
      '~/data/STR/parseq/english/lmdb/train/real/OpenVINO',
      '~/data/STR/parseq/english/lmdb/train/real/RCTW17',
      '~/data/STR/parseq/english/lmdb/train/real/ReCTS',
      '~/data/STR/parseq/english/lmdb/train/real/TextOCR',
      '~/data/STR/parseq/english/lmdb/train/real/Uber',
    ]
    transforms:
      - DecodeImagePIL:
          img_mode: RGB
      - PARSeqAugPIL:
      - ARLabelEncode:
          character_dict_path: *character_dict_path
          use_space_char: *use_space_char
          max_text_length: *max_text_length
      - RecTVResize:
          image_shape: [32, 128]
          padding: False
      - KeepKeys:
          keep_keys: ['image', 'label', 'length']
  loader:
    shuffle: True
    batch_size_per_card: 192
    drop_last: True
    num_workers: 4

Eval:
  dataset:
    name: LMDBDataSet
    data_dir_list: [
      '~/data/STR/openocr/evaluation/CUTE80',
      '~/data/STR/openocr/evaluation/IC13_857',
      '~/data/STR/openocr/evaluation/IC15_1811',
      '~/data/STR/openocr/evaluation/IIIT5k',
      '~/data/STR/openocr/evaluation/SVT',
      '~/data/STR/openocr/evaluation/SVTP',
    ]
    transforms:
      - DecodeImagePIL:
          img_mode: RGB
      - ARLabelEncode:
          character_dict_path: *character_dict_path
          use_space_char: *use_space_char
          max_text_length: *max_text_length
      - RecTVResize:
          image_shape: [32, 128]
          padding: False
      - KeepKeys:
          keep_keys: ['image', 'label', 'length']
  loader:
    shuffle: False
    drop_last: False
    batch_size_per_card: 192
    num_workers: 4
